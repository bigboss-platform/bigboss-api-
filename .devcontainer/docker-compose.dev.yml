services:
    api:
        build:
            context: ..
            dockerfile: .devcontainer/Dockerfile.dev
        volumes:
            - ..:/workspace:cached
        command: sleep infinity
        environment:
            - DATABASE_URL=postgresql+asyncpg://bigboss:bigboss@postgres:5432/bigboss_db
            - REDIS_URL=redis://redis:6379/0
            - APP_ENV=local
            - APP_DEBUG=true
        networks:
            - bigboss-dev
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_started

    postgres:
        image: postgres:16
        environment:
            POSTGRES_USER: bigboss
            POSTGRES_PASSWORD: bigboss
            POSTGRES_DB: bigboss_db
        ports:
            - "5432:5432"
        volumes:
            - postgres-dev-data:/var/lib/postgresql/data
        networks:
            - bigboss-dev
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U bigboss -d bigboss_db"]
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        ports:
            - "6379:6379"
        networks:
            - bigboss-dev

    mailhog:
        image: mailhog/mailhog
        ports:
            - "1025:1025"
            - "8025:8025"
        networks:
            - bigboss-dev

networks:
    bigboss-dev:

volumes:
    postgres-dev-data:
