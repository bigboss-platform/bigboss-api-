repos:
    - repo: local
      hooks:
          - id: ruff-lint
            name: Ruff linter
            entry: poetry run ruff check --fix
            language: system
            types: [python]
            pass_filenames: true

          - id: black-format
            name: Black formatter
            entry: poetry run black --check
            language: system
            types: [python]
            pass_filenames: true

          - id: mypy-type-check
            name: Mypy type check
            entry: poetry run mypy app
            language: system
            pass_filenames: false
            always_run: true

          - id: unit-tests
            name: Unit tests
            entry: poetry run pytest tests/unit --tb=short -q
            language: system
            pass_filenames: false
            always_run: true
